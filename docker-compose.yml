services:
  kafka:
    image: apache/kafka:4.0.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "1"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address :9001
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-market-lake}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ "$$MINIO_ROOT_USER" != "$$S3_ACCESS_KEY" ] || [ "$$MINIO_ROOT_PASSWORD" != "$$S3_SECRET_KEY" ]; then
          echo "S3_ACCESS_KEY/S3_SECRET_KEY must match MINIO_ROOT_USER/MINIO_ROOT_PASSWORD for local MinIO"
          exit 1
        fi
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.10.1
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY:-minioadmin}"
      AWS_REGION: "${S3_REGION:-us-east-1}"
      CATALOG_URI: "jdbc:sqlite:/tmp/iceberg_catalog.db"
      CATALOG_WAREHOUSE: "${ICEBERG_WAREHOUSE:-s3://market-lake/warehouse}"
      CATALOG_IO__IMPL: "org.apache.iceberg.aws.s3.S3FileIO"
      CATALOG_S3_ENDPOINT: "${S3_ENDPOINT:-http://minio:9000}"
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    volumes:
      - iceberg_catalog_data:/tmp
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8181/v1/config >/dev/null 2>&1 || curl -fsS http://localhost:8181/v1/config >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  iceberg_catalog_data:
  minio_data:
